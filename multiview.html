<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiView — BeckStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1f2d45;
    --cyan: #00d4ff;
    --cyan-dim: rgba(0, 212, 255, 0.12);
    --coral: #ff4757;
    --green: #2ed573;
    --yellow: #ffa502;
    --text: #e8edf5;
    --muted: #8892a4;
    --label: #4a5568;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: rgba(10, 14, 26, 0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nav-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--cyan);
    text-decoration: none;
    letter-spacing: -0.5px;
  }
  .nav-logo span { color: var(--text); }

  .nav-links { display: flex; gap: 24px; list-style: none; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links .active { color: var(--cyan); }

  .nav-right { display: flex; gap: 10px; align-items: center; }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }

  .btn-ghost.active-btn {
    border-color: var(--cyan);
    color: var(--cyan);
    background: var(--cyan-dim);
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .toolbar-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }

  /* LAYOUT PICKER */
  .layout-btns { display: flex; gap: 6px; }

  .layout-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px;
    height: 36px;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 0;
  }

  .layout-btn:hover { border-color: var(--cyan); color: var(--cyan); }
  .layout-btn.active { border-color: var(--cyan); background: var(--cyan-dim); color: var(--cyan); }

  .layout-btn svg { width: 18px; height: 18px; fill: currentColor; }

  .toolbar-sep {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }

  .toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  .live-count-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 71, 87, 0.1);
    border: 1px solid rgba(255, 71, 87, 0.3);
    color: var(--coral);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 100px;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--coral);
    border-radius: 50%;
    position: relative;
  }
  .live-dot::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1.5px solid var(--coral);
    animation: radar 1.4s ease-out infinite;
  }

  @keyframes radar {
    0% { opacity: 0.8; transform: scale(1); }
    100% { opacity: 0; transform: scale(2.5); }
  }

  /* MAIN AREA */
  .multiview-wrapper {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* STREAM GRID */
  .stream-grid {
    flex: 1;
    display: grid;
    gap: 3px;
    background: #000;
    min-height: 0;
    transition: grid-template-columns 0.3s, grid-template-rows 0.3s;
  }

  /* Layouts */
  .layout-1x1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
  .layout-1x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
  .layout-2x2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .layout-2x3 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .layout-pip  { grid-template-columns: 1fr 320px; grid-template-rows: 1fr; }

  /* STREAM SLOT */
  .stream-slot {
    position: relative;
    background: #050810;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .stream-slot.active-slot { outline: 2px solid var(--cyan); outline-offset: -2px; }

  /* Empty slot */
  .slot-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    height: 100%;
    color: var(--label);
    transition: background 0.2s;
  }

  .slot-empty:hover { background: rgba(255,255,255,0.02); }

  .slot-empty .plus-icon {
    width: 48px; height: 48px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--label);
    transition: all 0.2s;
  }

  .stream-slot:hover .plus-icon {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .slot-empty p { font-size: 13px; color: var(--label); }

  /* Filled slot */
  .slot-filled {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slot-video-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(32px, 6vw, 72px);
    background: var(--surface2);
  }

  /* Fake scan lines for "stream" feel */
  .slot-video-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.05) 2px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
  }

  .slot-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 40%);
    pointer-events: none;
  }

  .slot-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 14px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 8px;
  }

  .slot-info-left { min-width: 0; }

  .slot-sport {
    font-size: 10px;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }

  .slot-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(11px, 1.5vw, 14px);
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.2px;
  }

  .slot-viewers {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .slot-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    background: var(--coral);
    color: #fff;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .slot-controls {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .stream-slot:hover .slot-controls { opacity: 1; }

  .slot-btn {
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
    padding: 0;
  }

  .slot-btn:hover { background: rgba(255,71,87,0.8); border-color: transparent; }

  .slot-btn.mute-btn:hover { background: rgba(0,212,255,0.3); }

  .slot-num {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.3);
    font-family: 'Space Grotesk', sans-serif;
  }

  /* SIDEBAR */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar.collapsed { width: 0; border-left: none; overflow: hidden; }

  .sidebar-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
  }

  .sidebar-search {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-search input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 7px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .sidebar-search input::placeholder { color: var(--label); }
  .sidebar-search input:focus { border-color: var(--cyan); }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(31,45,69,0.5);
  }

  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item:last-child { border-bottom: none; }

  .sidebar-emoji { font-size: 22px; flex-shrink: 0; width: 36px; text-align: center; }

  .sidebar-info { flex: 1; min-width: 0; }

  .sidebar-sport {
    font-size: 10px;
    font-weight: 700;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .sidebar-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-viewers { font-size: 11px; color: var(--muted); }

  .sidebar-live {
    font-size: 9px;
    font-weight: 700;
    background: var(--coral);
    color: #fff;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .sidebar-add {
    font-size: 18px;
    color: var(--label);
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .sidebar-item:hover .sidebar-add { color: var(--cyan); }

  /* AUDIO INDICATOR */
  .audio-indicator {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--cyan);
    color: #0a0e1a;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 100px;
    display: none;
    letter-spacing: 0.5px;
  }
  .stream-slot.has-audio .audio-indicator { display: block; }

  /* FOOTER */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 6px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .status-bar span { display: flex; align-items: center; gap: 5px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* EMPTY GRID STATE */
  .grid-empty-hint {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--label);
    pointer-events: none;
  }
  .grid-empty-hint .hint-icon { font-size: 48px; margin-bottom: 8px; }
  .grid-empty-hint h3 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; color: var(--muted); }
  .grid-empty-hint p { font-size: 13px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .nav-links { display: none; }
    .layout-btn[data-layout="2x3"] { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .live-dot::after { animation: none; }
    .stream-grid { transition: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Beck<span>Stream</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Streams</a></li>
    <li><a href="multiview.html" class="active">MultiView</a></li>
    <li><a href="schedule.html">Schedule</a></li>
    <li><a href="#">Channels</a></li>
  </ul>
  <div class="nav-right">
    <button class="btn-ghost" onclick="toggleFullscreen()" id="fsBtn">⛶ Fullscreen</button>
    <button class="btn-ghost">Discord</button>
  </div>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="toolbar-label">Layout</span>

  <div class="layout-btns">
    <!-- 1 stream -->
    <button class="layout-btn" data-layout="1x1" onclick="setLayout('1x1', this)" title="1 Stream">
      <svg viewBox="0 0 18 18"><rect x="1" y="1" width="16" height="16" rx="2"/></svg>
    </button>
    <!-- 2 side by side -->
    <button class="layout-btn" data-layout="1x2" onclick="setLayout('1x2', this)" title="2 Streams">
      <svg viewBox="0 0 18 18"><rect x="1" y="1" width="7" height="16" rx="1.5"/><rect x="10" y="1" width="7" height="16" rx="1.5"/></svg>
    </button>
    <!-- 2x2 -->
    <button class="layout-btn active" data-layout="2x2" onclick="setLayout('2x2', this)" title="4 Streams">
      <svg viewBox="0 0 18 18"><rect x="1" y="1" width="7" height="7" rx="1.5"/><rect x="10" y="1" width="7" height="7" rx="1.5"/><rect x="1" y="10" width="7" height="7" rx="1.5"/><rect x="10" y="10" width="7" height="7" rx="1.5"/></svg>
    </button>
    <!-- 2x3 -->
    <button class="layout-btn" data-layout="2x3" onclick="setLayout('2x3', this)" title="6 Streams">
      <svg viewBox="0 0 18 18"><rect x="1" y="1" width="4" height="7" rx="1"/><rect x="7" y="1" width="4" height="7" rx="1"/><rect x="13" y="1" width="4" height="7" rx="1"/><rect x="1" y="10" width="4" height="7" rx="1"/><rect x="7" y="10" width="4" height="7" rx="1"/><rect x="13" y="10" width="4" height="7" rx="1"/></svg>
    </button>
    <!-- PiP style -->
    <button class="layout-btn" data-layout="pip" onclick="setLayout('pip', this)" title="Main + Side">
      <svg viewBox="0 0 18 18"><rect x="1" y="1" width="11" height="16" rx="1.5"/><rect x="14" y="1" width="3" height="7" rx="1"/><rect x="14" y="10" width="3" height="7" rx="1"/></svg>
    </button>
  </div>

  <div class="toolbar-sep"></div>

  <span class="toolbar-label">Audio</span>
  <button class="btn-ghost active-btn" id="audioSlot" onclick="cycleAudio()">Slot 1 🔊</button>

  <div class="toolbar-sep"></div>

  <button class="btn-ghost" onclick="clearAll()">✕ Clear All</button>

  <div class="toolbar-right">
    <div class="live-count-badge">
      <span class="live-dot"></span>
      <span id="liveCount">6 Live</span>
    </div>
    <button class="btn-ghost" id="sidebarToggle" onclick="toggleSidebar()">☰ Streams</button>
  </div>
</div>

<!-- MAIN -->
<div class="multiview-wrapper">

  <!-- STREAM GRID -->
  <div class="stream-grid layout-2x2" id="streamGrid">
    <!-- slots injected by JS -->
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Live Streams</span>
      <button class="btn-ghost" style="padding:3px 10px;font-size:12px" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="Search streams…" id="sidebarSearch" oninput="filterSidebar()">
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>

</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <span>📺 <span id="slotsFilled">0</span> / <span id="slotsTotal">4</span> slots filled</span>
  <span>🔊 Audio: Slot <span id="audioSlotNum">1</span></span>
  <span style="margin-left:auto">Click any empty slot or stream to add • Hover slot to remove</span>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────
const streams = [
  { id: 1,  emoji: "⚽", sport: "Soccer",     title: "Real Madrid vs. Atletico",    league: "La Liga",          viewers: "92.4k", live: true  },
  { id: 2,  emoji: "🏀", sport: "Basketball", title: "Lakers vs. Celtics",           league: "NBA Finals",        viewers: "141k",  live: true  },
  { id: 3,  emoji: "🎾", sport: "Tennis",     title: "Djokovic vs. Alcaraz",         league: "Wimbledon SF",      viewers: "58.1k", live: true  },
  { id: 4,  emoji: "🏒", sport: "Hockey",     title: "Rangers vs. Oilers",           league: "Stanley Cup G3",    viewers: "34.7k", live: true  },
  { id: 5,  emoji: "⚾", sport: "Baseball",   title: "Yankees vs. Red Sox",          league: "MLB",               viewers: "28.9k", live: true  },
  { id: 6,  emoji: "🥊", sport: "MMA",        title: "UFC 316 Main Card",            league: "UFC",               viewers: "87.2k", live: true  },
  { id: 7,  emoji: "🏈", sport: "Football",   title: "Chiefs vs. Eagles",            league: "NFL Preseason",     viewers: null,    live: false },
  { id: 8,  emoji: "🏎", sport: "F1",         title: "British GP Qualifying",        league: "Formula 1",         viewers: "44.1k", live: true  },
  { id: 9,  emoji: "⛳", sport: "Golf",       title: "US Open Final Round",          league: "USGA",              viewers: "19.3k", live: true  },
  { id: 10, emoji: "🏊", sport: "Swimming",   title: "World Aquatics 200m Final",   league: "FINA",              viewers: "12.3k", live: true  },
  { id: 11, emoji: "🏀", sport: "Basketball", title: "Warriors vs. Bucks",           league: "NBA Playoffs",      viewers: null,    live: false },
  { id: 12, emoji: "📺", sport: "Channel",    title: "ESPN 24/7",                    league: "Sports Channel",    viewers: "—",     live: true  },
  { id: 13, emoji: "🌍", sport: "Channel",    title: "BBC World News",               league: "News Channel",      viewers: "—",     live: true  },
  { id: 14, emoji: "🏟️", sport: "Soccer",    title: "Barcelona vs. Sevilla",        league: "La Liga",           viewers: "61.0k", live: true  },
];

// ─── STATE ──────────────────────────────────────────────
const layoutSlotCount = { '1x1': 1, '1x2': 2, '2x2': 4, '2x3': 6, 'pip': 2 };
let currentLayout = '2x2';
let slots = [null, null, null, null]; // array of stream objects or null
let audioSlotIndex = 0; // which slot has audio

// ─── LAYOUT ─────────────────────────────────────────────
function setLayout(layout, btn) {
  currentLayout = layout;
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const grid = document.getElementById('streamGrid');
  grid.className = 'stream-grid layout-' + layout;

  const count = layoutSlotCount[layout];
  // Trim or expand slots array
  while (slots.length < count) slots.push(null);
  slots = slots.slice(0, count);

  // Keep audioSlot valid
  if (audioSlotIndex >= count) audioSlotIndex = 0;

  renderGrid();
  updateStatusBar();
}

// ─── GRID RENDER ────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('streamGrid');
  grid.innerHTML = '';

  slots.forEach((stream, i) => {
    const slot = document.createElement('div');
    slot.className = 'stream-slot' + (i === audioSlotIndex ? ' has-audio' : '');
    slot.dataset.index = i;

    if (stream) {
      slot.innerHTML = `
        <div class="slot-filled">
          <div class="slot-video-bg">${stream.emoji}</div>
          <div class="slot-overlay"></div>
          <div class="audio-indicator">🔊 AUDIO</div>
          <div class="slot-num">${i + 1}</div>
          <div class="slot-info">
            <div class="slot-info-left">
              <div class="slot-sport">${stream.sport}</div>
              <div class="slot-title">${stream.title}</div>
              ${stream.viewers ? `<div class="slot-viewers">👁 ${stream.viewers}</div>` : ''}
            </div>
            ${stream.live ? '<span class="slot-badge">● LIVE</span>' : ''}
          </div>
          <div class="slot-controls">
            <button class="slot-btn mute-btn" onclick="setAudioSlot(${i}, event)" title="Set Audio">🔊</button>
            <button class="slot-btn" onclick="openInPlayer(${i}, event)" title="Open in Player">⛶</button>
            <button class="slot-btn" onclick="removeStream(${i}, event)" title="Remove">✕</button>
          </div>
        </div>
      `;
      slot.addEventListener('click', () => setAudioSlot(i));
    } else {
      slot.innerHTML = `
        <div class="slot-empty">
          <div class="plus-icon">+</div>
          <p>Click to add stream</p>
        </div>
      `;
      slot.addEventListener('click', () => openSidebarForSlot(i));
    }

    grid.appendChild(slot);
  });

  updateAudioBtn();
}

// ─── AUDIO ──────────────────────────────────────────────
function setAudioSlot(index, e) {
  if (e) e.stopPropagation();
  if (!slots[index]) return;
  audioSlotIndex = index;
  document.getElementById('streamGrid').querySelectorAll('.stream-slot').forEach((s, i) => {
    s.classList.toggle('has-audio', i === index);
  });
  updateAudioBtn();
  document.getElementById('audioSlotNum').textContent = index + 1;
  showToast(`🔊 Audio set to Slot ${index + 1} — ${slots[index].title}`);
}

function cycleAudio() {
  const filledSlots = slots.map((s, i) => s ? i : null).filter(i => i !== null);
  if (!filledSlots.length) return;
  const cur = filledSlots.indexOf(audioSlotIndex);
  const next = filledSlots[(cur + 1) % filledSlots.length];
  setAudioSlot(next);
}

function updateAudioBtn() {
  const btn = document.getElementById('audioSlot');
  const stream = slots[audioSlotIndex];
  btn.textContent = stream ? `Slot ${audioSlotIndex + 1} 🔊` : 'No Audio';
}

// ─── ADD / REMOVE ────────────────────────────────────────
let targetSlotIndex = null;

function openSidebarForSlot(index) {
  targetSlotIndex = index;
  document.getElementById('sidebar').classList.remove('collapsed');
  document.getElementById('sidebarSearch').focus();
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
}

function addStreamToSlot(stream) {
  // Find first empty slot if no target
  let idx = targetSlotIndex;
  if (idx === null || slots[idx] !== null) {
    idx = slots.findIndex(s => s === null);
  }
  if (idx === -1) {
    showToast('All slots are full. Remove a stream first.');
    return;
  }

  // Prevent duplicate
  if (slots.some(s => s && s.id === stream.id)) {
    showToast(`${stream.title} is already in the grid.`);
    return;
  }

  slots[idx] = stream;
  targetSlotIndex = null;
  renderGrid();
  updateStatusBar();
  showToast(`Added: ${stream.title}`);
}

function removeStream(index, e) {
  if (e) e.stopPropagation();
  const name = slots[index]?.title;
  slots[index] = null;
  if (audioSlotIndex === index) {
    const next = slots.findIndex(s => s !== null);
    audioSlotIndex = next === -1 ? 0 : next;
  }
  renderGrid();
  updateStatusBar();
  if (name) showToast(`Removed: ${name}`);
}

function clearAll() {
  slots = slots.map(() => null);
  audioSlotIndex = 0;
  renderGrid();
  updateStatusBar();
  showToast('All streams cleared.');
}

// ─── OPEN IN PLAYER ─────────────────────────────────────
function openInPlayer(index, e) {
  if (e) e.stopPropagation();
  const stream = slots[index];
  if (!stream) return;
  const params = new URLSearchParams({ title: stream.title, sport: stream.sport, meta: stream.league });
  window.open('player.html?' + params.toString(), '_blank');
}

// ─── SIDEBAR ────────────────────────────────────────────
function renderSidebar(filter = '') {
  const list = document.getElementById('sidebarList');
  const q = filter.toLowerCase();
  const filtered = streams.filter(s =>
    !q || s.title.toLowerCase().includes(q) || s.sport.toLowerCase().includes(q) || s.league.toLowerCase().includes(q)
  );

  list.innerHTML = '';
  filtered.forEach(stream => {
    const inGrid = slots.some(s => s && s.id === stream.id);
    const item = document.createElement('div');
    item.className = 'sidebar-item';
    item.innerHTML = `
      <div class="sidebar-emoji">${stream.emoji}</div>
      <div class="sidebar-info">
        <div class="sidebar-sport">${stream.sport}</div>
        <div class="sidebar-name">${stream.title}</div>
        <div class="sidebar-viewers">${stream.viewers ? '👁 ' + stream.viewers : 'Upcoming'}</div>
      </div>
      ${stream.live ? '<span class="sidebar-live">LIVE</span>' : ''}
      <span class="sidebar-add">${inGrid ? '✓' : '+'}</span>
    `;
    if (!inGrid) {
      item.style.cursor = 'pointer';
      item.addEventListener('click', () => {
        addStreamToSlot(stream);
        renderSidebar(document.getElementById('sidebarSearch').value);
      });
    } else {
      item.style.opacity = '0.5';
      item.style.cursor = 'default';
    }
    list.appendChild(item);
  });
}

function filterSidebar() {
  renderSidebar(document.getElementById('sidebarSearch').value);
}

// ─── STATUS BAR ─────────────────────────────────────────
function updateStatusBar() {
  const filled = slots.filter(Boolean).length;
  document.getElementById('slotsFilled').textContent = filled;
  document.getElementById('slotsTotal').textContent = slots.length;
  document.getElementById('liveCount').textContent = streams.filter(s => s.live).length + ' Live';
}

// ─── FULLSCREEN ─────────────────────────────────────────
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    document.getElementById('fsBtn').textContent = '✕ Exit Fullscreen';
  } else {
    document.exitFullscreen();
    document.getElementById('fsBtn').textContent = '⛶ Fullscreen';
  }
}

// ─── TOAST ──────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── KEYBOARD SHORTCUTS ─────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'Tab') { e.preventDefault(); cycleAudio(); }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'Escape') document.getElementById('sidebar').classList.add('collapsed');
  // Number keys 1-6 to set audio slot
  const num = parseInt(e.key);
  if (num >= 1 && num <= slots.length && slots[num-1]) setAudioSlot(num - 1);
});

// ─── INIT ───────────────────────────────────────────────
renderSidebar();
updateStatusBar();
renderGrid();

// Auto-fill first 4 slots with top live streams on load
const topLive = streams.filter(s => s.live).slice(0, 4);
topLive.forEach((s, i) => { slots[i] = s; });
renderGrid();
updateStatusBar();
renderSidebar();
</script>
</body>
</html>

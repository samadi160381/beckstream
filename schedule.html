<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule — BeckStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1f2d45;
    --cyan: #00d4ff;
    --cyan-dim: rgba(0, 212, 255, 0.12);
    --coral: #ff4757;
    --green: #2ed573;
    --yellow: #ffa502;
    --text: #e8edf5;
    --muted: #8892a4;
    --label: #4a5568;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 60px;
    background: rgba(10, 14, 26, 0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--cyan);
    text-decoration: none;
    letter-spacing: -0.5px;
  }
  .nav-logo span { color: var(--text); }

  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links .active { color: var(--cyan); }

  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }

  /* PAGE HEADER */
  .page-header {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 32px 32px;
    border-bottom: 1px solid var(--border);
  }

  .page-header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .page-header h1 em { font-style: normal; color: var(--cyan); }
  .page-header p { color: var(--muted); font-size: 15px; }

  /* CONTROLS */
  .controls {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 32px 0;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    flex-wrap: wrap;
  }

  .day-tab {
    background: none;
    border: none;
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    min-width: 64px;
  }

  .day-tab:hover { color: var(--text); }

  .day-tab.active {
    background: var(--cyan);
    color: #0a0e1a;
    font-weight: 600;
  }

  .day-tab .day-name { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .day-tab .day-num { font-size: 18px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; line-height: 1; }
  .day-tab.today .day-name { color: inherit; }

  /* SPORT FILTER */
  .sport-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .sport-select:focus { border-color: var(--cyan); }

  .controls-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

  .timezone-label { font-size: 12px; color: var(--muted); }

  /* MAIN */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 32px 80px;
  }

  /* TIME GRID */
  .schedule-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* TIME BLOCK HEADER */
  .time-block { margin-bottom: 8px; }

  .time-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .time-label span {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .time-label hr {
    flex: 1;
    border: none;
    border-top: 1px solid var(--border);
  }

  /* EVENT ROW */
  .event-row {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 6px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }

  .event-row:hover {
    border-color: rgba(0, 212, 255, 0.35);
    transform: translateX(3px);
  }

  .event-row.is-live {
    border-left: 3px solid var(--coral);
    background: linear-gradient(90deg, rgba(255,71,87,0.06) 0%, var(--surface) 40%);
  }

  .event-row.is-live:hover { border-color: var(--coral); }

  .event-time {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .event-time .ampm {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }

  .event-main { display: flex; flex-direction: column; gap: 3px; min-width: 0; }

  .event-sport {
    font-size: 11px;
    font-weight: 600;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .event-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-sub { font-size: 12px; color: var(--muted); }

  .event-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }

  .badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .badge-live { background: var(--coral); color: #fff; }
  .badge-soon { background: rgba(255, 165, 2, 0.15); color: var(--yellow); border: 1px solid rgba(255, 165, 2, 0.3); }
  .badge-upcoming { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .badge-finished { background: transparent; color: var(--label); border: 1px solid var(--label); }

  .live-dot {
    width: 5px; height: 5px;
    background: #fff;
    border-radius: 50%;
    position: relative;
  }

  .live-dot::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1px solid #fff;
    animation: radar 1.4s ease-out infinite;
  }

  @keyframes radar {
    0% { opacity: 0.8; transform: scale(1); }
    100% { opacity: 0; transform: scale(2.5); }
  }

  .event-duration { font-size: 11px; color: var(--label); }

  /* EMPTY */
  .empty-day {
    text-align: center;
    padding: 64px 0;
    color: var(--muted);
  }
  .empty-day .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-day p { font-size: 15px; }

  /* TODAY MARKER */
  .now-marker {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0 8px;
  }
  .now-marker span {
    font-size: 11px;
    font-weight: 700;
    color: var(--coral);
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .now-marker hr {
    flex: 1;
    border: none;
    border-top: 2px solid var(--coral);
    opacity: 0.5;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 90%;
    max-width: 520px;
    padding: 28px;
  }

  .modal h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }

  .modal-sport { font-size: 12px; color: var(--cyan); font-weight: 600; text-transform: uppercase; margin-bottom: 16px; letter-spacing: 0.5px; }

  .modal-details { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

  .modal-detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  .modal-detail-row:last-child { border-bottom: none; padding-bottom: 0; }
  .modal-detail-row .label { color: var(--muted); }
  .modal-detail-row .val { font-weight: 500; }

  .modal-actions { display: flex; gap: 10px; }

  .btn-primary {
    background: var(--cyan);
    color: #0a0e1a;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
    flex: 1;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--coral); color: var(--coral); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 28px 32px;
    text-align: center;
    font-size: 13px;
    color: var(--label);
  }
  footer a { color: var(--muted); text-decoration: none; margin: 0 12px; }
  footer a:hover { color: var(--cyan); }

  @media (max-width: 640px) {
    nav { padding: 0 16px; }
    .nav-links { display: none; }
    .page-header, .controls, main { padding-left: 16px; padding-right: 16px; }
    .event-row { grid-template-columns: 64px 1fr; }
    .event-right { display: none; }
    .day-tab { min-width: 44px; padding: 8px 10px; }
    .day-tab .day-name { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .live-dot::after { animation: none; }
    .event-row:hover { transform: none; }
  }
</style>
</head>

<script>
// ─── DATA ───────────────────────────────────────────────
// All times stored as [dayOffset, hour, minute] relative to today
// dayOffset: 0=today, 1=tomorrow, etc. (we'll also do -1, -2 for past days this week)

const now = new Date();
const todayIdx = now.getDay(); // 0=Sun

function buildEvent(dayOffset, hour, minute, sport, emoji, title, league, durationMin) {
  const d = new Date(now);
  d.setDate(now.getDate() + dayOffset);
  d.setHours(hour, minute, 0, 0);
  return { dayOffset, date: d, sport, emoji, title, league, durationMin: durationMin || 120 };
}

const allEvents = [
  // Today (offset 0)
  buildEvent(0, 7, 30,  "Soccer",     "⚽", "Real Madrid vs. Atletico Madrid",   "La Liga",              105),
  buildEvent(0, 10, 0,  "Tennis",     "🎾", "Wimbledon QF — Djokovic vs Zverev", "Wimbledon 2026",       180),
  buildEvent(0, 13, 0,  "Baseball",   "⚾", "Yankees vs. Red Sox",               "MLB Regular Season",   180),
  buildEvent(0, 15, 30, "Basketball", "🏀", "Lakers vs. Celtics",                "NBA Finals Game 5",    150),
  buildEvent(0, 18, 0,  "Soccer",     "⚽", "Barcelona vs. Sevilla",             "La Liga",              105),
  buildEvent(0, 20, 0,  "MMA",        "🥊", "UFC 316 — Jones vs. Aspinall",      "UFC Pay-Per-View",     240),

  // Yesterday (offset -1)
  buildEvent(-1, 8, 0,  "Tennis",     "🎾", "Wimbledon QF — Alcaraz vs Sinner",  "Wimbledon 2026",       180),
  buildEvent(-1, 12, 0, "Soccer",     "⚽", "Man City vs. Arsenal",              "Premier League",       105),
  buildEvent(-1, 15, 0, "Baseball",   "⚾", "Dodgers vs. Giants",                "MLB Regular Season",   180),
  buildEvent(-1, 19, 30,"Hockey",     "🏒", "Rangers vs. Oilers",                "Stanley Cup Finals",   180),

  // Tomorrow (offset +1)
  buildEvent(1, 9, 0,   "Golf",       "⛳", "US Open — Final Round",             "USGA",                 480),
  buildEvent(1, 12, 30, "Soccer",     "⚽", "Liverpool vs. Chelsea",             "Premier League",       105),
  buildEvent(1, 15, 0,  "Basketball", "🏀", "Warriors vs. Bucks",                "NBA Playoffs",         150),
  buildEvent(1, 18, 0,  "Baseball",   "⚾", "Cubs vs. Cardinals",                "MLB Regular Season",   180),
  buildEvent(1, 20, 30, "Football",   "🏈", "Chiefs vs. Eagles",                 "NFL Preseason",        210),

  // Day +2
  buildEvent(2, 8, 0,   "Tennis",     "🎾", "Wimbledon SF — Djokovic vs Alcaraz","Wimbledon 2026",       210),
  buildEvent(2, 11, 0,  "F1",         "🏎", "British Grand Prix — Race",         "Formula 1",            120),
  buildEvent(2, 14, 0,  "Soccer",     "⚽", "PSG vs. Bayern Munich",             "Champions League",     105),
  buildEvent(2, 19, 0,  "Hockey",     "🏒", "Panthers vs. Avalanche",            "Stanley Cup Finals",   180),
  buildEvent(2, 21, 0,  "Basketball", "🏀", "Heat vs. Thunder",                  "NBA Playoffs",         150),

  // Day +3
  buildEvent(3, 10, 0,  "Golf",       "⛳", "Scottish Open — Round 1",           "DP World Tour",        480),
  buildEvent(3, 13, 0,  "Baseball",   "⚾", "Mets vs. Phillies",                 "MLB Regular Season",   180),
  buildEvent(3, 16, 30, "Soccer",     "⚽", "Juventus vs. Inter Milan",          "Serie A",              105),
  buildEvent(3, 20, 0,  "MMA",        "🥊", "Bellator 310 Main Card",            "Bellator MMA",         240),

  // Day +4
  buildEvent(4, 7, 0,   "Tennis",     "🎾", "Wimbledon SF — Swiatek vs Gauff",   "Wimbledon 2026",       210),
  buildEvent(4, 12, 0,  "Soccer",     "⚽", "Dortmund vs. Leverkusen",           "Bundesliga",           105),
  buildEvent(4, 15, 0,  "Basketball", "🏀", "Nuggets vs. Knicks",                "NBA Playoffs",         150),
  buildEvent(4, 18, 30, "Football",   "🏈", "Ravens vs. Steelers",               "NFL Preseason",        210),
  buildEvent(4, 21, 0,  "Baseball",   "⚾", "Braves vs. Padres",                 "MLB Regular Season",   180),

  // Day +5
  buildEvent(5, 9, 30,  "Golf",       "⛳", "Scottish Open — Round 2",           "DP World Tour",        480),
  buildEvent(5, 11, 0,  "F1",         "🏎", "Hungarian GP — Qualifying",         "Formula 1",             90),
  buildEvent(5, 14, 0,  "Soccer",     "⚽", "Real Madrid vs. Villarreal",        "La Liga",              105),
  buildEvent(5, 17, 0,  "Hockey",     "🏒", "Stanley Cup Finals — Game 4",       "NHL",                  180),
  buildEvent(5, 20, 30, "Basketball", "🏀", "NBA Finals — Game 6",               "NBA",                  150),

  // Day +6
  buildEvent(6, 8, 0,   "Tennis",     "🎾", "Wimbledon Women's Final",           "Wimbledon 2026",       210),
  buildEvent(6, 11, 0,  "Tennis",     "🎾", "Wimbledon Men's Final",             "Wimbledon 2026",       240),
  buildEvent(6, 14, 0,  "Soccer",     "⚽", "Man United vs. Tottenham",          "Premier League",       105),
  buildEvent(6, 16, 0,  "F1",         "🏎", "Hungarian Grand Prix — Race",       "Formula 1",            120),
  buildEvent(6, 19, 30, "Baseball",   "⚾", "Yankees vs. Astros",                "MLB Regular Season",   180),
];

// ─── STATE ──────────────────────────────────────────────
let selectedOffset = 0;
let selectedEvent = null;

// ─── DAYS TAB BAR ───────────────────────────────────────
function buildDayTabs() {
  const container = document.getElementById('dayTabs');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for (let i = -1; i <= 6; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() + i);
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === 0 ? ' today active' : '');
    btn.dataset.offset = i;
    const dayName = i === 0 ? 'Today' : i === 1 ? 'Tmrw' : days[d.getDay()];
    btn.innerHTML = `<span class="day-name">${dayName}</span><span class="day-num">${d.getDate()}</span>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedOffset = i;
      renderSchedule();
    });
    container.appendChild(btn);
  }
}

// ─── RENDER ─────────────────────────────────────────────
function getStatus(event) {
  const start = event.date;
  const end = new Date(start.getTime() + event.durationMin * 60000);
  if (now >= start && now <= end) return 'live';
  const minsUntil = (start - now) / 60000;
  if (minsUntil > 0 && minsUntil <= 30) return 'soon';
  if (now > end) return 'finished';
  return 'upcoming';
}

function formatTime(d) {
  let h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `<span>${h}${m ? ':' + String(m).padStart(2,'0') : ''}</span><span class="ampm"> ${ampm}</span>`;
}

function formatDuration(mins) {
  if (mins >= 60) {
    const h = Math.floor(mins/60), m = mins % 60;
    return m ? `${h}h ${m}m` : `${h}h`;
  }
  return `${mins}m`;
}

function renderSchedule() {
  const sport = document.getElementById('sportSelect').value;
  const grid = document.getElementById('scheduleGrid');
  grid.innerHTML = '';

  let events = allEvents
    .filter(e => e.dayOffset === selectedOffset)
    .filter(e => sport === 'all' || e.sport === sport)
    .sort((a, b) => a.date - b.date);

  if (!events.length) {
    grid.innerHTML = `<div class="empty-day"><div class="empty-icon">📭</div><p>No events scheduled for this day${sport !== 'all' ? ' in ' + sport : ''}.</p></div>`;
    return;
  }

  // Group by time blocks (Morning/Afternoon/Evening/Night)
  const blocks = [
    { label: 'Morning', range: [0, 12], events: [] },
    { label: 'Afternoon', range: [12, 17], events: [] },
    { label: 'Evening', range: [17, 21], events: [] },
    { label: 'Night', range: [21, 24], events: [] },
  ];

  events.forEach(ev => {
    const h = ev.date.getHours();
    const block = blocks.find(b => h >= b.range[0] && h < b.range[1]);
    if (block) block.events.push(ev);
  });

  let nowMarkerInserted = false;

  blocks.forEach(block => {
    if (!block.events.length) return;

    const blockEl = document.createElement('div');
    blockEl.className = 'time-block';

    const labelEl = document.createElement('div');
    labelEl.className = 'time-label';
    labelEl.innerHTML = `<span>${block.label}</span><hr>`;
    blockEl.appendChild(labelEl);

    block.events.forEach(ev => {
      const status = getStatus(ev);

      // Insert NOW marker once before the next upcoming event
      if (!nowMarkerInserted && selectedOffset === 0 && (status === 'upcoming' || status === 'soon')) {
        const marker = document.createElement('div');
        marker.className = 'now-marker';
        marker.innerHTML = `<span>Now</span><hr>`;
        blockEl.appendChild(marker);
        nowMarkerInserted = true;
      }

      const row = document.createElement('a');
      row.className = 'event-row' + (status === 'live' ? ' is-live' : '');
      row.href = '#';

      let badgeHTML = '';
      if (status === 'live') badgeHTML = `<span class="badge badge-live"><span class="live-dot"></span>LIVE</span>`;
      else if (status === 'soon') badgeHTML = `<span class="badge badge-soon">Starting Soon</span>`;
      else if (status === 'finished') badgeHTML = `<span class="badge badge-finished">Finished</span>`;
      else badgeHTML = `<span class="badge badge-upcoming">Upcoming</span>`;

      row.innerHTML = `
        <div class="event-time">${formatTime(ev.date)}</div>
        <div class="event-main">
          <div class="event-sport">${ev.emoji} ${ev.sport}</div>
          <div class="event-title">${ev.title}</div>
          <div class="event-sub">${ev.league}</div>
        </div>
        <div class="event-right">
          ${badgeHTML}
          <span class="event-duration">${formatDuration(ev.durationMin)}</span>
        </div>
      `;

      row.addEventListener('click', e => { e.preventDefault(); openModal(ev); });
      blockEl.appendChild(row);
    });

    grid.appendChild(blockEl);
  });
}

// ─── MODAL ──────────────────────────────────────────────
function openModal(ev) {
  selectedEvent = ev;
  const status = getStatus(ev);
  document.getElementById('modalSport').textContent = ev.emoji + ' ' + ev.sport;
  document.getElementById('modalTitle').textContent = ev.title;

  const endTime = new Date(ev.date.getTime() + ev.durationMin * 60000);
  document.getElementById('modalDetails').innerHTML = `
    <div class="modal-detail-row"><span class="label">League / Event</span><span class="val">${ev.league}</span></div>
    <div class="modal-detail-row"><span class="label">Start Time</span><span class="val">${ev.date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div>
    <div class="modal-detail-row"><span class="label">End Time</span><span class="val">~${endTime.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div>
    <div class="modal-detail-row"><span class="label">Duration</span><span class="val">${formatDuration(ev.durationMin)}</span></div>
    <div class="modal-detail-row"><span class="label">Status</span><span class="val" style="color:${status==='live'?'var(--coral)':status==='soon'?'var(--yellow)':'var(--muted)'}">${status.charAt(0).toUpperCase()+status.slice(1)}</span></div>
  `;

  const btn = document.getElementById('modalBtn');
  if (status === 'live') { btn.textContent = '▶ Watch Now'; btn.disabled = false; }
  else if (status === 'soon') { btn.textContent = '⏳ Starting Soon'; btn.disabled = false; }
  else if (status === 'finished') { btn.textContent = '📼 Watch Replay'; btn.disabled = false; }
  else { btn.textContent = '🔔 Set Reminder'; btn.disabled = false; }

  document.getElementById('modal').classList.add('open');
}

function watchNow() {
  if (!selectedEvent) return;
  const status = getStatus(selectedEvent);
  if (status === 'live' || status === 'soon') {
    alert('In a real deployment, this would open the stream player for:\n' + selectedEvent.title);
  } else if (status === 'finished') {
    alert('In a real deployment, this would open the replay for:\n' + selectedEvent.title);
  } else {
    alert('Reminder set for:\n' + selectedEvent.title + '\n' + selectedEvent.date.toLocaleString());
  }
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

// ─── TIMEZONE LABEL ─────────────────────────────────────
function setTimezone() {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  document.getElementById('tzLabel').textContent = '🕐 ' + tz.replace(/_/g,' ');
}

// ─── INIT ───────────────────────────────────────────────
buildDayTabs();
setTimezone();
renderSchedule();

// Refresh statuses every minute so LIVE badges update
setInterval(renderSchedule, 60000);
</script>
</body>
